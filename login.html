<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fractal · Connexion</title>
  <meta name="description" content="Accédez à votre espace Fractal — newsletter financière indépendante.">
  <link rel="stylesheet" href="fractal.css">
  <link rel="icon" type="image/png" href="fractal_logo.png">
</head>
<body class="auth-page">

  <!-- Top bar -->
  <div class="auth-top-bar">
    <a href="apropos.html" class="auth-back-link">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      À propos
    </a>
    <a href="index.html" class="auth-back-link">
      Accueil
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    </a>
  </div>

  <!-- Auth card -->
  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-brand">
        <img src="fractal_logo.png" alt="Fractal" class="auth-logo-img">
        <span class="auth-brand-name">Fractal</span>
      </div>

      <h1 class="auth-title" id="authTitle">Connexion</h1>
      <p class="auth-subtitle" id="authSubtitle">Accédez à votre espace Fractal</p>

      <div class="auth-error" id="authError"></div>

      <form class="auth-form" id="authForm">
        <div id="nameField" style="display:none;">
          <label for="userName" class="f-label">Prénom</label>
          <input type="text" id="userName" class="f-input" placeholder="Votre prénom" autocomplete="name">
        </div>

        <div>
          <label for="userEmail" class="f-label">Adresse email</label>
          <input type="email" id="userEmail" class="f-input" placeholder="vous@exemple.com" required autocomplete="email">
        </div>

        <div>
          <label for="userPassword" class="f-label">Mot de passe</label>
          <input type="password" id="userPassword" class="f-input" placeholder="••••••••" required autocomplete="current-password" minlength="6">
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block" id="authBtn">
          <span id="authBtnText">Se connecter</span>
        </button>
      </form>

      <div class="auth-divider">ou</div>

      <button class="btn-google" id="googleBtn">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuer avec Google
      </button>

      <p class="auth-switch">
        <span id="switchText">Pas encore de compte ?</span>
        <a id="switchLink">Créer un compte</a>
      </p>
    </div>
  </main>

  <footer class="auth-footer">
    <p>© 2025 Fractal · Média de vulgarisation financière</p>
  </footer>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBSlXOeyDxVKUFBBkPTMbsS_oY6kADkbMg",
      authDomain: "fractal-86f1f.firebaseapp.com",
      projectId: "fractal-86f1f",
      storageBucket: "fractal-86f1f.firebasestorage.app",
      messagingSenderId: "954198010037",
      appId: "1:954198010037:web:3548437da32d3a34d7b6fc"
    };
    firebase.initializeApp(firebaseConfig);
    firebase.auth().languageCode = 'fr';

    let isLogin = true;
    const $ = id => document.getElementById(id);

    const errorMessages = {
      'auth/email-already-in-use': 'Cet email est déjà utilisé.',
      'auth/invalid-email': 'Adresse email invalide.',
      'auth/weak-password': 'Mot de passe trop faible (min. 6 caractères).',
      'auth/user-not-found': 'Aucun compte avec cet email.',
      'auth/wrong-password': 'Mot de passe incorrect.',
      'auth/invalid-credential': 'Email ou mot de passe incorrect.',
      'auth/too-many-requests': 'Trop de tentatives. Réessayez plus tard.',
      'auth/network-request-failed': 'Erreur réseau.',
    };

    function showError(msg) {
      $('authError').textContent = msg;
      $('authError').classList.add('visible');
    }
    function hideError() { $('authError').classList.remove('visible'); }

    $('switchLink').addEventListener('click', () => {
      isLogin = !isLogin;
      hideError();
      if (isLogin) {
        $('authTitle').textContent = 'Connexion';
        $('authSubtitle').textContent = 'Accédez à votre espace Fractal';
        $('authBtnText').textContent = 'Se connecter';
        $('nameField').style.display = 'none';
        $('switchText').textContent = 'Pas encore de compte ? ';
        $('switchLink').textContent = 'Créer un compte';
      } else {
        $('authTitle').textContent = 'Inscription';
        $('authSubtitle').textContent = 'Rejoignez la communauté Fractal';
        $('authBtnText').textContent = 'Créer mon compte';
        $('nameField').style.display = 'block';
        $('switchText').textContent = 'Déjà inscrit ? ';
        $('switchLink').textContent = 'Se connecter';
      }
    });

    $('authForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      const email = $('userEmail').value.trim();
      const password = $('userPassword').value;
      const name = $('userName').value.trim();

      try {
        if (isLogin) {
          await firebase.auth().signInWithEmailAndPassword(email, password);
        } else {
          const cred = await firebase.auth().createUserWithEmailAndPassword(email, password);
          if (name) await cred.user.updateProfile({ displayName: name });
        }
        window.location.href = 'index.html';
      } catch (err) {
        showError(errorMessages[err.code] || 'Une erreur est survenue.');
      }
    });

    $('googleBtn').addEventListener('click', async () => {
      hideError();
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await firebase.auth().signInWithPopup(provider);
        window.location.href = 'index.html';
      } catch (err) {
        if (err.code !== 'auth/popup-closed-by-user') {
          showError(errorMessages[err.code] || 'Connexion Google échouée.');
        }
      }
    });

    firebase.auth().onAuthStateChanged(user => {
      if (user) window.location.href = 'index.html';
    });
  </script>
</body>
</html>
