name: 🔄 Update Fractal Newsletter

on:
  schedule:
    - cron: '0 * * * *'      # Toutes les heures : newsletter + tentative de publication
  workflow_dispatch:          # Lancement manuel

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1 — Mise à jour de la newsletter (inchangé)
  # ---------------------------------------------------------------------------
  update-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser groq

      - name: 🤖 Run Fractal Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python fractal_pipeline_v6.py

      - name: 📝 Commit and push changes
        run: |
          git config user.name "Fractal Bot"
          git config user.email "bot@fractal.app"
          git add newsletter_data.json archives/
          if git diff --staged --quiet; then
            echo "✅ Pas de changement à commit"
          else
            git commit -m "📰 Newsletter update - $(date +'%Y-%m-%d %H:%M')"
            git push
          fi

  # ---------------------------------------------------------------------------
  # JOB 2 — Création + publication du carrousel Instagram
  # Tourne APRÈS le job 1, à chaque exécution. La publication n'a réellement
  # lieu que s'il existe un nouvel article (suivi via posted.json).
  # ---------------------------------------------------------------------------
  instagram-post:
    needs: update-newsletter
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r instagram/requirements.txt
          python -m playwright install --with-deps chromium

      - name: 🎨 Préparer le carrousel (sélection + copy IA + slides)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cd instagram && python run.py prepare

      - name: 📤 Mettre les images en ligne
        run: |
          git config user.name "Fractal Bot"
          git config user.email "bot@fractal.app"
          git add instagram/out instagram/posted.json
          if git diff --staged --quiet; then
            echo "✅ Rien de nouveau à publier"
          else
            git commit -m "📸 IG visuels - $(date +'%Y-%m-%d')"
            git push
          fi

      - name: ⏳ Laisser le CDN servir les images
        run: sleep 25

      - name: 🚀 Publier sur Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GRAPH_VERSION:   v23.0
          PUBLIC_BASE_URL: https://raw.githubusercontent.com/foryen/Fractal/main/instagram/out
        run: |
          cd instagram && python run.py publish

      - name: 💾 Sauvegarder posted.json
        run: |
          git add instagram/posted.json
          if git diff --staged --quiet; then
            echo "rien à sauvegarder"
          else
            git commit -m "📸 IG posted.json - $(date +'%Y-%m-%d')"
            git push
          fi
