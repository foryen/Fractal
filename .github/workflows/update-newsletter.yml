name: 🔄 Update Fractal Newsletter

on:
  # Lance toutes les heures
  schedule:
    - cron: '0 * * * *'  # Toutes les heures à :00
  
  # Permet de lancer manuellement depuis l'interface GitHub
  workflow_dispatch:

# Permissions nécessaires pour commit auto
permissions:
  contents: write

jobs:
  update-newsletter:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser groq
      
      - name: 🤖 Run Fractal Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python fractal_pipeline_v6.py
      
      - name: 📝 Commit and push changes
        run: |
          git config user.name "Fractal Bot"
          git config user.email "bot@fractal.app"
          git add newsletter_data.json archives/
          # Commit seulement s'il y a des changements
          if git diff --staged --quiet; then
            echo "✅ Pas de changement à commit"
          else
            git commit -m "📰 Newsletter update - $(date +'%Y-%m-%d %H:%M')"
            git push
          fi